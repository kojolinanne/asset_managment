<!-- 條碼掃描改由 GitHub Pages popup 實現，不再使用 Quagga2 CDN -->

<style>
/* ========== 掃描區域樣式 ========== */
.scanner-zone {
  background: #f8f9fa;
  border: 2px solid #dee2e6;
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 20px;
}

.scanner-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
}

.scanner-header h6 {
  margin: 0;
  font-size: 16px;
  font-weight: bold;
  color: #333;
}

.scanner-header i {
  margin-right: 8px;
  color: #4a90e2;
}

.btn-close-scanner {
  background: transparent;
  border: none;
  color: #666;
  font-size: 20px;
  cursor: pointer;
  padding: 5px;
  width: 30px;
  height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.2s;
}

.btn-close-scanner:hover {
  color: #e74c3c;
}

/* 掃描等待提示容器 */
.scanner-popup-hint {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
  gap: 10px;
  color: #555;
  text-align: center;
}

.scanner-popup-hint i {
  font-size: 32px;
  color: #4a90e2;
}

.scanner-popup-hint p {
  margin: 0;
  font-size: 14px;
  line-height: 1.5;
}

#Scanner_scanStatus {
  margin-top: 10px;
  padding: 10px;
  border-radius: 4px;
  font-size: 14px;
  text-align: center;
}

.scan-status-success {
  background: #d4edda;
  color: #155724;
  border: 1px solid #c3e6cb;
}

.scan-status-error {
  background: #f8d7da;
  color: #721c24;
  border: 1px solid #f5c6cb;
}

/* ========== RWD 適配 ========== */
@media (max-width: 768px) {
  #Scanner_reader {
    height: 250px;
  }
}
</style>

<!-- ========== 掃描區模板 ========== -->
<template id="Scanner_template">
  <div class="scanner-header">
    <h6><i class="fa-solid fa-camera"></i> 條碼掃描</h6>
    <button class="btn-close-scanner" onclick="Scanner_toggle()">
      <i class="fas fa-times"></i>
    </button>
  </div>

  <div class="scanner-popup-hint">
    <i class="fas fa-external-link-alt"></i>
    <p>掃描器已在外部視窗開啟<br><small>掃描完成後結果會自動傳回</small></p>
  </div>

  <div id="Scanner_scanStatus"></div>
</template>

<!-- ========== JavaScript 邏輯區 ========== -->
<script>
(function() {
  'use strict';

  // ========== 模組依賴檢查 ==========
  if (typeof window.BatchList_addItem !== 'function') {
    console.warn('[Scanner] ⚠️ BatchList 模組尚未載入，部分功能可能無法使用');
    console.warn('[Scanner] 請確保在 apply.html 中先引入 batch_processing_list.html');
  }

  // ========== 掃描器頁面 URL ==========
  const SCANNER_PAGE_URL = 'https://takahope.github.io/1D_camera_scan/';

  // ========== 全局變數 ==========
  let Scanner_active = false;
  let Scanner_initialized = false;
  let Scanner_popupWindow = null;
  let Scanner_messageListener = null;
  let Scanner_popupWatcher = null;

  // ========== 音效 Base64 (嗶聲) ==========
  const BEEP_SOUND = 'data:audio/mpeg;base64,//uQxAAAAAAAAAAAAAAAAAAAAAAAWGluZwAAAA8AAAACAAAESAAzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMz////////////////////////////////////////////////////////////AAABLAMAAIEQAABgAAACRAAAAAAAAARIAAAAAAAAAAAAAAAAAAAAAA==';
  const Scanner_audioPlayer = new Audio(BEEP_SOUND);
  Scanner_audioPlayer.volume = 0.5;

  // ========== 初始化函數 ==========
  document.addEventListener('DOMContentLoaded', () => {
    setTimeout(Scanner_init, 600); // 稍晚於 BatchList 初始化
  });

  window.Scanner_init = function() {
    if (Scanner_initialized) return;
    Scanner_initialized = true;

    console.log('[Scanner] 初始化掃描模組...');

    // 檢查 BatchList 模組
    if (typeof window.BatchList_addItem !== 'function') {
      console.error('[Scanner] ❌ BatchList 模組未載入，掃描功能將無法正常運作');
      return;
    }

    // 增強搜尋框（支援 Enter 鍵智能掃描）
    Scanner_enhanceSearchBox();

    // 插入掃描區 HTML 模板
    const template = document.getElementById('Scanner_template');
    if (template) {
      const zone = document.getElementById('Scanner_zone');
      if (zone) {
        zone.appendChild(template.content.cloneNode(true));
        console.log('[Scanner] 掃描區模板已插入');
      }
    }

    console.log('[Scanner] ✓ 掃描模組初始化完成');
  };

  // ========== 增強搜尋框：支援 Enter 鍵智能掃描 ==========
  /**
   * 增強搜尋框，支援 Enter 鍵智能掃描
   * 參考 qr_code_template.html 的 Enter 鍵處理邏輯
   *
   * 核心設計：
   * - 監聽搜尋框的 Enter 鍵事件
   * - 嘗試將輸入內容格式化為條碼
   * - 查找對應資產（使用 BatchList 模組的資產索引）
   * - 找到資產 → 掃描模式：加入清單 + 清空輸入框 + Toast 提示
   * - 找不到資產 → 搜尋模式：保持原搜尋功能（input 事件已觸發即時搜尋）
   */
  let Scanner_searchBoxEnhanced = false;  // ✨ 防止重複綁定

  function Scanner_enhanceSearchBox() {
    const searchBox = document.getElementById('search-box');
    if (!searchBox) {
      console.warn('[Scanner] 找不到 search-box 元素，跳過增強');
      return;
    }

    // ✨ 防止重複綁定事件監聽器
    if (Scanner_searchBoxEnhanced && searchBox._scannerEnhanced) {
      console.log('[Scanner] 搜尋框已增強，跳過重複綁定');
      return;
    }

    // ✨ 標記此搜尋框已被增強
    searchBox._scannerEnhanced = true;
    Scanner_searchBoxEnhanced = true;

    // 監聯 Enter 鍵
    searchBox.addEventListener('keypress', function(e) {
      if (e.key !== 'Enter') return;

      const inputValue = searchBox.value.trim();
      if (!inputValue) return;

      // 嘗試作為條碼處理
      const formattedCode = Scanner_formatBarcode(inputValue);

      // ✨ 修改查找順序：優先使用 window.allAssets，再檢查全域 allAssets
      const asset = (typeof window.allAssets !== 'undefined' && window.allAssets ?
                      window.allAssets.find(a => a.id === formattedCode || a.id === inputValue) : null) ||
                    (typeof allAssets !== 'undefined' && allAssets ?
                      allAssets.find(a => a.id === formattedCode || a.id === inputValue) : null) ||
                    BatchList_findAsset(formattedCode) ||
                    BatchList_findAsset(inputValue);

      if (asset) {
        // 找到資產 → 掃描模式
        e.preventDefault(); // 阻止預設行為
        BatchList_addItem(asset.id);
        BatchList_showToast(`已加入：${asset.assetName}`, 'success');

        // ✨ 清空輸入框（優先使用 React 方式）
        if (typeof window.clearSearchBox === 'function') {
          // React 環境：調用全域函數更新 state（這會正確清空 controlled input）
          window.clearSearchBox();
          console.log('[Scanner] Enter 鍵掃描成功（React 清空）:', asset.id);
        } else {
          // 非 React 環境：直接操作 DOM + 觸發 input 事件
          searchBox.value = '';
          searchBox.dispatchEvent(new Event('input', { bubbles: true }));
          console.log('[Scanner] Enter 鍵掃描成功（DOM 清空）:', asset.id);
        }
      }
      // 找不到資產 → 保持搜尋狀態，不做任何處理
    });

    console.log('[Scanner] ✓ 已增強搜尋框，支援 Enter 鍵掃描');
  }
  window.Scanner_enhanceSearchBox = Scanner_enhanceSearchBox;

  // ========== 確保模板已插入（支援 React 動態渲染環境）==========
  function Scanner_ensureTemplate() {
    const zone = document.getElementById('Scanner_zone');
    if (!zone) {
      console.error('[Scanner] 找不到 Scanner_zone 元素');
      return false;
    }

    // 檢查模板是否已插入（以 scanner-header 類別判斷）
    if (zone.querySelector('.scanner-header')) {
      return true; // 模板已插入
    }

    // 嘗試插入模板
    const template = document.getElementById('Scanner_template');
    if (!template) {
      console.error('[Scanner] 找不到 Scanner_template 元素');
      return false;
    }

    zone.appendChild(template.content.cloneNode(true));
    console.log('[Scanner] ✓ 掃描區模板已動態插入（React 環境）');
    return true;
  }
  window.Scanner_ensureTemplate = Scanner_ensureTemplate;

  // ========== 掃描控制函數 ==========
  window.Scanner_toggle = function() {
    const zone = document.getElementById('Scanner_zone');
    if (!zone) {
      console.error('[Scanner] Scanner_zone 不存在');
      return;
    }

    if (zone.style.display === 'none' || !zone.style.display) {
      // 開啟掃描器前，確保模板已插入
      if (!Scanner_ensureTemplate()) {
        alert('掃描器初始化失敗，請重新整理頁面');
        return;
      }
      // 開啟掃描器
      zone.style.display = 'block';
      Scanner_start();
    } else {
      // 關閉掃描器
      zone.style.display = 'none';
      Scanner_stop();
    }
  };

  function Scanner_notifyApp(eventName, payload) {
    const handler = window[eventName];
    if (typeof handler !== 'function') return;
    try {
      handler(payload || {});
    } catch (error) {
      console.error(`[Scanner] ${eventName} 執行失敗:`, error);
    }
  }

  function Scanner_cleanupListener() {
    if (Scanner_messageListener) {
      window.removeEventListener('message', Scanner_messageListener);
      Scanner_messageListener = null;
    }
  }

  function Scanner_handlePopupBlocked() {
    const message = '瀏覽器封鎖了掃描視窗，請允許彈出視窗後重試';
    console.warn('[Scanner] popup 被封鎖');
    Scanner_updateStatus(message, 'error');
    Scanner_notifyApp('AppScanner_onError', {
      message: message,
      reason: 'popup-blocked'
    });
    Scanner_stop({
      reason: 'popup-blocked',
      preserveStatus: true
    });
  }

  function Scanner_start() {
    if (Scanner_active) return;

    Scanner_cleanupListener();

    const popup = window.open(
      SCANNER_PAGE_URL,
      'barcode_scanner',
      'width=480,height=640,toolbar=no,location=no,status=no,menubar=no,scrollbars=no,resizable=yes'
    );

    if (!popup || popup.closed) {
      Scanner_handlePopupBlocked();
      return;
    }

    Scanner_popupWindow = popup;
    Scanner_active = true;
    Scanner_updateStatus('外部掃描器已開啟，請在新視窗中掃描...', 'success');

    // 接收掃描結果
    Scanner_messageListener = function(event) {
      if (!event.data || event.data.type !== 'BARCODE_SCANNED') return;
      if (event.data.source !== 'github-pages-scanner') return;
      console.log('[Scanner] 收到掃描結果:', event.data.raw);
      Scanner_processBarcode(event.data.raw);
      Scanner_stop({ reason: 'scan-complete' });
    };
    window.addEventListener('message', Scanner_messageListener);

    // 監控 popup 是否被使用者手動關閉
    if (Scanner_popupWatcher) {
      clearInterval(Scanner_popupWatcher);
    }
    Scanner_popupWatcher = setInterval(() => {
      if (Scanner_popupWindow && Scanner_popupWindow.closed) {
        Scanner_stop({ reason: 'popup-closed' });
      }
    }, 500);

    console.log('[Scanner] 外部掃描器 popup 已開啟');
  }
  window.Scanner_start = Scanner_start;

  function Scanner_stop(options) {
    const {
      reason = 'stopped',
      preserveStatus = false,
      notifyApp = true
    } = options || {};

    if (Scanner_popupWatcher) {
      clearInterval(Scanner_popupWatcher);
      Scanner_popupWatcher = null;
    }
    if (Scanner_popupWindow && !Scanner_popupWindow.closed) {
      Scanner_popupWindow.close();
    }
    Scanner_popupWindow = null;

    Scanner_cleanupListener();

    const zone = document.getElementById('Scanner_zone');
    if (zone) zone.style.display = 'none';

    Scanner_active = false;
    console.log('[Scanner] 掃描器已停止');
    if (!preserveStatus) {
      Scanner_updateStatus('', '');
    }
    if (notifyApp) {
      Scanner_notifyApp('AppScanner_onClosed', { reason: reason });
    }
  }
  window.Scanner_stop = Scanner_stop;

  function Scanner_processBarcode(rawCode) {
    // 進階模式：使用專用的 handleScan，正確設定 scannerCompletionRef
    if (typeof window.AdvancedMode_handleScan === 'function' &&
        window.AssetCartStore && window.AssetCartStore.isAdvancedMode()) {
      window.AdvancedMode_handleScan(rawCode, { source: 'camera' });
      return;
    }

    // 格式化條碼
    const formattedCode = Scanner_formatBarcode(rawCode);
    console.log('[Scanner] 格式化條碼:', rawCode, '->', formattedCode);

    // 使用 BatchList 模組查找資產
    const asset = BatchList_findAsset(formattedCode) ||
                  BatchList_findAsset(rawCode) ||
                  (typeof allAssets !== 'undefined' ?
                    allAssets.find(a => a.id === formattedCode || a.id === rawCode) : null);

    if (asset) {
      BatchList_addItem(asset.id);
      BatchList_showToast(`已加入：${asset.assetName}`, 'success');
      Scanner_updateStatus(`✓ 已加入：${asset.assetName}`, 'success');

      // 播放飛行動畫（從掃描區飛向清單按鈕）
      const scannerEl = document.getElementById('Scanner_zone');
      if (scannerEl) {
        BatchList_animateFlyToCart(scannerEl);
      }

      Scanner_playSound();
      return { success: true, asset: asset, assetId: asset.id, code: formattedCode };
    } else {
      BatchList_showToast(`未找到資產：${formattedCode}`, 'error');
      Scanner_updateStatus(`✗ 未找到資產：${formattedCode}`, 'error');
      return { success: false, asset: null, assetId: formattedCode, code: formattedCode };
    }
  }
  window.Scanner_processBarcode = Scanner_processBarcode;

  // ========== 輔助函數 ==========
  function Scanner_formatBarcode(barcode) {
    if (!barcode) return '';
    const cleanCode = barcode.toString().trim();

    // 20 碼去前 2 位，其他保留
    let processed = cleanCode.length === 20 ? cleanCode.substring(2) : cleanCode;

    if (processed.length < 11) return processed;

    // 格式化為 XXXXXXX-XXXX-XXXXXXX
    return processed.substring(0, 7) + '-' +
           processed.substring(7, 11) + '-' +
           processed.substring(11);
  }
  window.Scanner_formatBarcode = Scanner_formatBarcode;

  function Scanner_updateStatus(message, type) {
    const statusEl = document.getElementById('Scanner_scanStatus');
    if (!statusEl) return;

    if (!message) {
      statusEl.textContent = '';
      statusEl.className = '';
      return;
    }

    statusEl.textContent = message;
    statusEl.className = type === 'success' ? 'scan-status-success' : 'scan-status-error';
  }
  window.Scanner_updateStatus = Scanner_updateStatus;

  function Scanner_playSound() {
    Scanner_audioPlayer.currentTime = 0;
    Scanner_audioPlayer.play().catch(e => console.log('[Scanner] 音效播放被阻擋:', e));
  }
  window.Scanner_playSound = Scanner_playSound;

  console.log('[Scanner] 掃描模組已載入，等待初始化...');
})();
</script>
